<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Splash</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/splash.css">
</head>
<body>
    <div class="container">
        <div class="main">
            <h1 class="title">CodeMotion <span class="version"></span></h1>
            <p class="description"></p>
            <p class="status"></p>
            <div class="footer">
                <div class="buttons hidden">
                    <button class="danger" id="close" gls="splash.closeBtn">Close</button>
                    <button id="offline" gls="splash.offlineMode">Offline mode</button>
                </div>

                <svg
                class="ring-loader"
                viewBox="0 0 40 40"
                height="40"
                width="40"
                >
                <circle 
                    class="track"
                    cx="20" 
                    cy="20" 
                    r="17.5" 
                    pathlength="100" 
                    stroke-width="5px" 
                    fill="none" 
                />
                <circle 
                    class="car"
                    cx="20" 
                    cy="20" 
                    r="17.5" 
                    pathlength="100" 
                    stroke-width="5px" 
                    fill="none" 
                />
                </svg>

                <p class="author"></p>
            </div>
        </div>
        <div class="image"></div>
    </div>
</body>
</html>

<script src="../app/splash/splashRenderer.js" type="module"></script>
