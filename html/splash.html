<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./assets/css/global.css">
</head>
<style>
    body {
        background: #101010;
        color: white;
        border-radius: 100px;
        user-select: none;
        font-family: "Inter", sans-serif;
        margin: 0px;
    }

    p, button, h1, h2, h3, h4, h5 {
        font-family: "Inter", sans-serif;
    }

    .hidden {
        display: none!important;
    }

    .container {
        display: flex;
        flex-direction: row;
        align-content: center;
        text-align: center;
        width: 100%;
        height: 100%;
        justify-content: flex-start;
    }

    h1 {
        margin: 0px;
    }
    p {
        margin: 0px;
    }

    .main {
        width: 50%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
        padding: 40px;
    }
    .main .footer {
        position: absolute;
        bottom: 35px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
    .image {
        width: 50%;
        height: 500px;
        overflow: hidden;
        background: #101010;
    }
    .image img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center;
        image-rendering: auto;
        -webkit-user-drag: none;
    }

    .version {
        opacity: .2;
        font-size: 14px;
    }
    .description {
        opacity: .5;
        margin-top: 10px;
        text-align: left;
    }
    .author {
        opacity: .2;
        font-size: 10px;
        margin-top: 10px;
    }
    .title {
        font-weight: 800;
    }
    .status {
        opacity: .5;
        margin-top: 10px;
        font-size: 10px;
        text-align: left;
    }

    .text-danger {
        color: #ff2727;
        opacity: 1;
    }

    .buttons {
        display: flex;
        gap: 5px;
    }
    .buttons button {
        background: #282828;
        border-radius: 5px;
        border: none;
        color: white;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        padding: 10px 15px;
        font-weight: 400;
        cursor: pointer;
        transition: .2s;
        outline: none;
    }
    .buttons button:hover {
        opacity: .5;
        background: #3c3c3c;
    }
    .buttons button.danger {
        background: #ed3838;
    }

    .ring-loader {
        --uib-size: 30px;
        --uib-color: white;
        --uib-speed: 2s;
        --uib-bg-opacity: 0;
        height: var(--uib-size);
        width: var(--uib-size);
        transform-origin: center;
        animation: rotate var(--uib-speed) linear infinite;
        will-change: transform;
        overflow: visible;
    }

    .car {
        fill: none;
        stroke: var(--uib-color);
        stroke-dasharray: 1, 200;
        stroke-dashoffset: 0;
        stroke-linecap: round;
        animation: stretch calc(var(--uib-speed) * 0.75) ease-in-out infinite;
        will-change: stroke-dasharray, stroke-dashoffset;
        transition: stroke 0.5s ease;
    }

    .track {
        fill: none;
        stroke: var(--uib-color);
        opacity: var(--uib-bg-opacity);
        transition: stroke 0.5s ease;
    }

    @keyframes rotate {
        100% {
            transform: rotate(360deg);
        }
    }

    @keyframes stretch {
        0% {
            stroke-dasharray: 0, 150;
            stroke-dashoffset: 0;
        }
        50% {
            stroke-dasharray: 75, 150;
            stroke-dashoffset: -25;
        }
        100% {
            stroke-dashoffset: -100;
        }
    }
</style>
<body>
    <div class="container">
        <div class="main">
            <h1 class="title">CodeMotion <span class="version"></span></h1>
            <p class="description"></p>
            <p class="status"></p>
            <div class="footer">
                <div class="buttons hidden">
                    <button class="danger" id="close">Close</button>
                </div>

                <svg
                class="ring-loader"
                viewBox="0 0 40 40"
                height="40"
                width="40"
                >
                <circle 
                    class="track"
                    cx="20" 
                    cy="20" 
                    r="17.5" 
                    pathlength="100" 
                    stroke-width="5px" 
                    fill="none" 
                />
                <circle 
                    class="car"
                    cx="20" 
                    cy="20" 
                    r="17.5" 
                    pathlength="100" 
                    stroke-width="5px" 
                    fill="none" 
                />
                </svg>

                <p class="author"></p>
            </div>
        </div>
        <div class="image"></div>
    </div>
</body>
</html>

<script type="module">
    document.addEventListener("DOMContentLoaded", async () => {
        let packageData = await window.electron.getPackageData()
        let version = packageData.version
        let author = packageData.author
        let desc = packageData.description

        let image = document.querySelector(".image")
        let r = Math.floor(Math.random() * 12) + 1;
        let randomImage = `../assets/media/splash/${r}.png`
        let splashImage = new Image()
        splashImage.src = randomImage
        splashImage.alt = ""
        splashImage.decoding = "async"
        image.replaceChildren(splashImage)
        let buttons = document.querySelector(".buttons")

        document.querySelector(".version").innerText = `v${version}`
        document.querySelector(".author").innerText = `Created by ${author}`
        document.querySelector(".description").innerText = desc

        window.electron.onStatusUpdate((_event, data) => {
            document.querySelector(".status").innerText = data.msg

            if(data.error) {
               document.querySelector(".status").classList.add("text-danger") 
               document.querySelector(".ring-loader").classList.add("hidden")

                let buttons = document.querySelector(".buttons")
                buttons.classList.remove("hidden")
            }
        });

        buttons.querySelector("#close").addEventListener("click", () => {
            window.electron.close()
        })
    })
</script>
